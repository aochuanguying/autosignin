# ============================================
# HiGPT 网关 - ai.fssc.top
# ============================================

# HTTP -> HTTPS 重定向 (防火墙已拦截80端口外网访问，此处仅作为内网兜底)
server {
    listen 80;
    server_name ai.fssc.top ws.fssc.top;
    return 301 https://$host$request_uri;
}

# HiGPT 内网入口 (10.30.5.33:80 -> 3000)
server {
    listen 80;
    server_name 10.30.5.33;

    # 仅允许内网访问
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    allow 192.168.0.0/16;
    allow 127.0.0.1;
    deny all;

    location / {
        proxy_pass http://127.0.0.1:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 120s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        client_max_body_size 50m;

        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;
    }
}

# HiGPT HTTPS 入口
server {
    listen 443 ssl http2;
    server_name ai.fssc.top;

    ssl_certificate /usr/local/nginx/conf/ssl/fssc.top.crt;
    ssl_certificate_key /usr/local/nginx/conf/ssl/fssc.top.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    location / {
        proxy_pass http://127.0.0.1:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;

        proxy_connect_timeout 120s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        client_max_body_size 50m;

        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;
    }
}

# ============================================
# v2ray WebSocket - ws.fssc.top
# ============================================

# v2ray WebSocket HTTPS
server {
    listen 443 ssl http2;
    server_name ws.fssc.top;

    ssl_certificate /usr/local/nginx/conf/ssl/fssc.top.crt;
    ssl_certificate_key /usr/local/nginx/conf/ssl/fssc.top.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    location / {
        proxy_pass http://127.0.0.1:10000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 60s;
        proxy_send_timeout 86400s;
        proxy_read_timeout 86400s;

        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;
    }
}
