#user  nobody;
worker_processes  auto;  # 自动匹配CPU核心数

error_log  logs/error.log;

pid        logs/nginx.pid;

worker_rlimit_nofile 65535;

events {
    worker_connections  65535;
    multi_accept on;
    use epoll;
}

stream {
    upstream dns {
        server 172.16.35.20:53;
    }
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  logs/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    server_tokens   off;

    keepalive_timeout  65;
    client_header_timeout 60;
    client_body_timeout 60;
    send_timeout 60;

    # Gzip 压缩
    gzip on;
    gzip_min_length 1k;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_vary on;

    # ============================================
    # 默认 server - 拦截所有未匹配的请求（防扫描）
    # ============================================
    server {
        listen 80 default_server;
        listen 443 ssl default_server;
        ssl_certificate /usr/local/nginx/conf/ssl/fssc.top.crt;
        ssl_certificate_key /usr/local/nginx/conf/ssl/fssc.top.key;
        server_name _;
        return 444;  # 直接断开，不返回任何内容
    }

    # ============================================
    # 内网服务 - localhost (仅允许内网访问)
    # ============================================
    server {
        listen       80;
        server_name  localhost;

        # 仅允许内网访问
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow 127.0.0.1;
        deny all;

        location / {
            root   /usr/local/nginx/html/dist;
            index  index.html index.htm;
        }

        location /api {
            proxy_pass http://fssctest.hisense.com/fsscfas;
        }

        location ~* \.(js|css|html|gif|jpg|jpeg|png|swf|flv|rar|zip)$ {
            root html/dist;
            valid_referers none blocked 10.30.5.33 103.94.200.246 *.hisense.com;
            add_header Cache-Control no-cache;
            expires 0;
            if ($invalid_referer) {
                return 404;
            }
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }

    include conf.d/*.conf;
}
